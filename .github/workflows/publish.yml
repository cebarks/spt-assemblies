name: Publish to GitHub Packages

on:
  push:
    tags: ['v*']

permissions:
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'
      - name: Extract version from tag
        id: version
        env:
          REF_NAME: ${{ github.ref_name }}
        run: echo "version=${REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - run: dotnet restore
      - run: dotnet pack src/SPT.ReferenceAssemblies/SPT.ReferenceAssemblies.csproj -p:Version=${{ steps.version.outputs.version }} -o ./nupkgs
      - run: dotnet nuget push ./nupkgs/*.nupkg --source https://nuget.pkg.github.com/cebarks/index.json --api-key ${{ secrets.GITHUB_TOKEN }}
